<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actividad 1.3 - Interfaz y Formularios</title>
    <link rel="stylesheet" href="styles2.css">
</head>
<body>

    <div class="contenedor">
        <header>
            <h1>Mi Sitio Web Progresivo</h1>
            <nav>
                <a href="#">Inicio</a> |
                <a href="#">Servicios</a> |
                <a href="#contacto">Contacto</a>
            </nav>
        </header>

        <main>
            <section>
                <h2>Bienvenido a la Actividad 1.3</h2>
                <p>
                    Esta página demuestra el uso de <strong>CSS3</strong>,
                    <strong>Semántica</strong> y <strong>Validación de Formularios</strong>.
                </p>
            </section>

            <section id="contacto">
                <hr>
                <h3>Formulario de contacto</h3>
                <form action="#" method="POST">

                    <label for="nombre">Nombre Completo:</label>
                    <input type="text" id="nombre" name="nombre"
                           placeholder="Solo letras"
                           pattern="[A-Za-z\s]+"
                           title="Solo se permiten letras" required>

                    <label for="email">Correo Electrónico:</label>
                    <input type="email" id="email" name="email"
                           placeholder="ejemplo@correo.com" required>

                    <label for="interes">Interés principal:</label>
                    <select id="interes" name="interes">
                        <option value="web">Diseño Web</option>
                        <option value="dev">Programación</option>
                        <option value="mkt">Marketing Digital</option>
                        <option value="ccn"> Concesionaria</option>
                    </select>

                    <label for="mensaje">Mensaje:</label>
                    <textarea id="mensaje" name="mensaje" rows="4"
                              placeholder="Escribe aquí tu consulta..." required></textarea>

                    <label>
                        <input type="checkbox" name="suscripcion" checked>
                        Deseo recibir noticias en mi correo.
                    </label>

                    <div style="margin-top: 10px;">
                        <button type="submit">Enviar Mensaje</button>
                        <button type="reset" style="background-color: #e74c3c;">Limpiar</button>
                    </div>

                </form>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 - Clase de Programación Web - Estándares W3C</p>
        </footer>
    </div>

</body>
</html>
